syntax = "proto3";

package ai.skyfortress.guidance;

import "google/protobuf/timestamp.proto";

message TargetEstimate {
    google.protobuf.Timestamp timestamp = 1;
    bool precise_timestamp = 2;
    string target_id = 3;
    WGS84 position = 4;
    EnuVelocity velocity = 5;
    EstimateState state = 6;
    EstimateUncertainties uncertainties = 7;
}

message RawData {
    google.protobuf.Timestamp timestamp_utc = 1;
    uint32 track_id = 3;
    WGS84 position = 4;
    EnuUncertainty position_uncertainty = 5;
}

message EstimateUncertainties {
    EnuUncertainty position = 1;
    EnuUncertainty velocity = 2;
}

enum EstimateState {
    Unstable = 0;
    Stable = 1;
}

message WGS84 {
    float latitude_deg = 1;
    float longitude_deg = 2;
    float altitude_msl_m = 3;
}

message EnuVelocity {
    float east_ms = 1;
    float north_ms = 2;
    float up_ms = 3;
}

message EnuUncertainty {
    float east = 1;
    float north = 2;
    float up = 3;
}

message Ping {
}

message ServerMessage {
    oneof message {
        Ping ping = 1;
        TargetEstimate target_estimate = 2;
        TargetEstimate interceptor_estimate = 3;
        RawData target_raw = 4;
        RawData target_interceptor = 5;
    }
}

message ClientStatus {
    ClientState state = 1;
    WGS84 position = 2;
}

enum ClientState {
    NotReady = 0;
    Ready = 1;
    Engaging = 2;
}

message ClientMessage {
    oneof message {
        ClientStatus status = 1;
    }
}
